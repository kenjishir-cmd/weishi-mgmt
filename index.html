<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="偉士管委">
<link rel="manifest" href="manifest.json">
<title>偉士大樓管委費系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#c8a96e; --gold-light:#e8c98e; --gold-dim:#8a7148;
    --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
    --border:#30363d; --text:#e6edf3; --text2:#8b949e;
    --green:#3fb950; --green-bg:#0d2818;
    --red:#f85149; --red-bg:#2d1215;
    --blue:#58a6ff; --blue-bg:#0c1f35;
    --purple:#d8b4fe;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh}
  
  /* Header */
  #header{padding:calc(var(--safe-top) + 10px) 16px 10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
  .header-row{display:flex;align-items:flex-start;justify-content:space-between}
  .header-title{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:2px}
  .year-selector { background: var(--bg3); border: 1px solid var(--gold-dim); color: var(--gold-light); border-radius: 6px; padding: 2px 8px; font-family: 'DM Mono'; font-size: 14px; outline: none; margin-top: 4px; }
  .header-datetime{text-align:right}
  .header-time{font-family:'DM Mono'; font-size:16px; color:var(--gold-light); letter-spacing:1px}
  .header-date{font-size:10px; color:var(--text2); margin-top:1px}
  .header-weather { font-size: 10px; color: var(--gold-dim); margin-top: 4px; display: flex; align-items: center; justify-content: flex-end; gap: 6px; }

  /* Version Bar */
  .version-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:4px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .version-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:'DM Mono';font-size:10px;padding:3px 8px;cursor:pointer}
  .share-btn{background:var(--blue-bg);border:1px solid var(--blue);color:var(--blue);border-radius:6px;font-size:10px;padding:3px 10px;cursor:pointer;font-weight:600}

  /* Hero */
  #balance-hero{background:linear-gradient(135deg,#161b22 0%,#1a1f2a 100%);border-bottom:1px solid var(--border);padding:16px 16px 14px;flex-shrink:0}
  .balance-label{font-size:11px;color:var(--text2);letter-spacing:1px;margin-bottom:4px}
  .balance-amount{font-family:'DM Mono',monospace;font-size:36px;color:var(--gold-light);line-height:1}
  .balance-amount span{font-size:18px;color:var(--gold-dim);margin-right:4px}
  .balance-row{display:flex;gap:20px;margin-top:12px}
  .balance-stat{flex:1}
  .balance-stat-label{font-size:10px;color:var(--text2)}
  .balance-stat-val{font-family:'DM Mono';font-size:13px;margin-top:2px}

  /* Tabs */
  #tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
  .tab{flex:1;padding:11px 0;font-size:13px;font-weight:500;color:var(--text2);text-align:center;cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}

  /* Content Area */
  #content{flex:1;overflow-y:auto;padding-bottom:calc(var(--safe-bot) + 140px)}
  .section{padding:14px 16px 0}
  .section-title{font-size:11px;color:var(--text2);letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

  /* 統計圖表 */
  .chart-container { background: var(--bg2); border-radius: 12px; border: 1px solid var(--border); padding: 16px; margin: 0 16px 16px; display: flex; align-items: center; gap: 20px; }
  .pie-svg { width: 60px; height: 60px; transform: rotate(-90deg); border-radius: 50%; }
  .chart-legend { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text2); }
  .legend-color { width: 8px; height: 8px; border-radius: 2px; }

  /* 待繳戶標籤區 (對應截圖3) */
  .unpaid-alert-box { background: var(--red-bg); border: 1px solid var(--red); border-radius: 10px; padding: 12px; margin: 0 16px 12px; }
  .unpaid-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .unpaid-tag { font-size: 12px; border: 1px solid rgba(248,81,73,0.4); color: var(--red); padding: 4px 10px; border-radius: 6px; font-weight: 500; background: rgba(248,81,73,0.1); }

  /* 樓層模擬 (對應截圖2) */
  .floor-layout { display: flex; flex-direction: column; gap: 12px; padding: 0 16px 20px; }
  .floor-row { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 8px; align-items: center; }
  .elevator-shaft { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .elevator-icon { width: 24px; height: 24px; fill: var(--gold-dim); opacity: 0.6; animation: lift-pulse 3s infinite ease-in-out; }
  @keyframes lift-pulse { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 0.8; transform: scale(1.1); fill: var(--gold); } }

  /* 住戶卡片 (對應截圖1) */
  .unit-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 4px;text-align:center;cursor:pointer}
  .unit-name{font-size:13px;font-weight:700;margin-bottom:6px;color:var(--gold-light)}
  .unit-dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-bottom:8px}
  .dot{width:5px;height:5px;border-radius:50%; background: var(--border);}
  .dot.paid{background:var(--green)}
  .latest-date-label { font-family: 'DM Mono'; font-size: 13px; font-weight: 700; color: var(--purple); background: rgba(216,180,254,0.1); padding: 3px 6px; border-radius: 4px; display: inline-block; }

  /* Footer & FAB */
  .version-footer { text-align: center; padding: 10px; font-size: 10px; color: var(--text2); font-family: 'DM Mono'; border-top: 1px solid var(--border); background: var(--bg2); }
  #fab-area{position:fixed;left:0;right:0;bottom:calc(var(--safe-bot) + 45px);display:flex;justify-content:center;gap:12px;padding:0 16px; z-index: 100;}
  .fab{flex:1;max-width:180px;padding:14px 0;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
  
  /* Overlay */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:0.3s}
  .overlay.show{opacity:1;pointer-events:all}
  .sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px calc(var(--safe-bot) + 20px);width:100%;max-height:90vh;overflow-y:auto;transform:translateY(40px);transition:transform 0.3s}
  .overlay.show .sheet{transform:translateY(0)}
  .month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .month-btn{padding:10px 4px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;text-align:center}
  .month-btn.paid{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:600}
  .form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-row">
      <div>
        <div class="header-title">偉士大樓</div>
        <select class="year-selector" id="year-select" onchange="changeYear()">
          <option value="2025">2025 年</option>
          <option value="2026" selected>2026 年</option>
          <option value="2027">2027 年</option>
        </select>
      </div>
      <div class="header-datetime">
        <div class="header-time" id="clock">--:--:--</div>
        <div class="header-date" id="datedisp">----/--/--</div>
        <div class="header-weather">
          <span id="loc-disp">斗六市</span> <span id="temp-disp">--°C</span>
        </div>
      </div>
    </div>
  </div>

  <div class="version-bar">
    <button class="version-btn" onclick="openSheet('version')">v1.9.8 · 更新履歷</button>
    <button class="share-btn" onclick="shareStatus()">📤 分享報表</button>
  </div>

  <div id="balance-hero">
    <div class="balance-label">系統總結餘 (含跨年)</div>
    <div class="balance-amount"><span>NT$</span><span id="balance-num">--</span></div>
    <div class="balance-row">
      <div class="balance-stat"><div class="balance-stat-label">總收入</div><div id="total-income-disp" style="color:var(--green)">--</div></div>
      <div class="balance-stat"><div class="balance-stat-label">總支出</div><div id="total-expense-disp" style="color:var(--red)">--</div></div>
      <div class="balance-stat"><div class="balance-stat-label">繳費戶</div><div id="paid-units-disp" style="color:var(--gold)">--</div></div>
    </div>
  </div>

  <div id="tabs">
    <div class="tab active" onclick="switchTab('units')">住戶管理</div>
    <div class="tab" onclick="switchTab('records')">帳務記錄</div>
  </div>

  <div id="content">
    <div id="tab-units">
      <div class="section"><div class="section-title">繳費概況統計</div></div>
      <div class="chart-container">
        <svg class="pie-svg" viewBox="0 0 32 32" id="pie-chart"></svg>
        <div class="chart-legend" id="chart-legend"></div>
      </div>
      <div id="unpaid-alert-area"></div>
      <div class="floor-layout" id="unit-grid"></div>
    </div>
    <div id="tab-records" style="display:none">
      <div class="section"><div class="section-title" id="record-year-title">帳務明細</div><div id="records-list"></div></div>
    </div>
  </div>

  <div class="version-footer">WEISHI MGMT v1.9.8</div>
  <div id="fab-area">
    <button class="fab" style="background:var(--green);color:#000" onclick="openSheet('income')">＋ 收入</button>
    <button class="fab" style="background:var(--red);color:#fff" onclick="openSheet('expense')">－ 支出</button>
  </div>
</div>

<div class="overlay" id="unit-overlay" onclick="closeIfOutside(event,'unit-overlay')"><div class="sheet"><div id="unit-sheet-title" style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:15px;text-align:center"></div><div class="month-grid" id="unit-month-grid"></div><button class="fab" style="width:100%;margin-top:20px;background:var(--bg3);color:var(--text2)" onclick="closeSheet('unit')">關閉</button></div></div>
<div class="overlay" id="record-overlay" onclick="closeIfOutside(event,'record-overlay')"><div class="sheet"><div id="record-sheet-title" style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:15px;text-align:center"></div><input type="date" id="rec-date" class="form-input"><input type="text" id="rec-desc" placeholder="說明" class="form-input"><input type="number" id="rec-amount" placeholder="金額" class="form-input"><div style="display:flex;gap:10px"><button class="fab" style="background:var(--bg3);color:var(--text2)" onclick="closeSheet('record')">取消</button><button class="fab" style="background:var(--gold);color:var(--bg)" onclick="submitRecord()">確認</button></div></div></div>
<div class="overlay" id="version-overlay" onclick="closeIfOutside(event,'version-overlay')"><div class="sheet"><div style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:15px;text-align:center">更新履歷</div><div style="font-size:13px; line-height:1.6"><b>v1.9.8 功能全面回歸版</b><br>• 找回呼吸電梯模擬與環境天氣顯示<br>• 保留跨年份切換與圓餅圖統計<br>• 修復待繳戶標籤間隔問題<br>• 同步舊資料搬移修復</div><button class="fab" style="width:100%;margin-top:20px;background:var(--bg3);color:var(--text2)" onclick="closeSheet('version')">關閉</button></div></div>

<script>
const INIT_BALANCE = 97246;
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const FLOORS = [ {L:'426-6',R:'424-6'},{L:'426-5',R:'424-5'},{L:'426-4',R:'424-4'},{L:'426-3',R:'424-3'},{L:'426-2',R:'424-2'},{L:'426-1',R:'424-1'} ];
const UNITS = FLOORS.flatMap(f => [f.L, f.R]);
const ELEVATOR_SVG = `<svg class="elevator-icon" viewBox="0 0 24 24"><path d="M7,2L17,2A2,2 0 0,1 19,4V20A2,2 0 0,1 17,22H7A2,2 0 0,1 5,20V4A2,2 0 0,1 7,2M7,4V20H17V4H7M8,6H11V9H8V6M13,6H16V9H13V6M8,11H11V14H8V11M13,11H16V14H13V11M8,16H11V19H8V16M13,16H16V19H13V16Z" /></svg>`;

let state = { currentYear: "2026", records: [], payments: {}, nextId: 1 };

function loadData() {
  const newSaved = localStorage.getItem('weishi_v195_data');
  const oldSaved = localStorage.getItem('weishi-state-v2');
  if (newSaved) { state = JSON.parse(newSaved); } 
  else if (oldSaved) { // 自動搬家
    const old = JSON.parse(oldSaved);
    state.records = old.records || [];
    state.nextId = old.nextId || 1;
    state.payments["2026"] = old.payments || {};
    saveData();
  }
  if (!state.payments[state.currentYear]) state.payments[state.currentYear] = {};
  document.getElementById('year-select').value = state.currentYear;
}
function saveData() { localStorage.setItem('weishi_v195_data', JSON.stringify(state)); }
function changeYear() {
  state.currentYear = document.getElementById('year-select').value;
  if (!state.payments[state.currentYear]) state.payments[state.currentYear] = {};
  saveData(); render();
}
async function updateWeather() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async (pos) => {
    try {
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true&hourly=apparent_temperature`);
      const data = await res.json();
      document.getElementById('temp-disp').textContent = `${data.hourly.apparent_temperature[0]}°C (體感)`;
      const lat = pos.coords.latitude; const lon = pos.coords.longitude;
      document.getElementById('loc-disp').textContent = (lat > 23.6 && lat < 23.8 && lon > 120.4 && lon < 120.6) ? '斗六市' : '目前位置';
    } catch (e) {}
  });
}

function render() {
  let totalB = INIT_BALANCE;
  state.records.forEach(r => totalB += (r.type === 'income' ? r.amount : -r.amount));
  document.getElementById('balance-num').textContent = totalB.toLocaleString();
  const yrRecs = state.records.filter(r => r.year === state.currentYear);
  const yrInc = yrRecs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const yrExp = yrRecs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  document.getElementById('total-income-disp').textContent = 'NT$ ' + yrInc.toLocaleString();
  document.getElementById('total-expense-disp').textContent = 'NT$ ' + yrExp.toLocaleString();
  const currPay = state.payments[state.currentYear] || {};
  const paidU = UNITS.filter(u => MONTHS.some(m => currPay[u] && currPay[u][m])).length;
  document.getElementById('paid-units-disp').textContent = paidU + ' / 12';
  document.getElementById('record-year-title').textContent = `${state.currentYear} 帳務明細`;
  renderUnits(); renderChart(); renderRecords(); renderUnpaidAlert();
}

function renderUnpaidAlert() {
  const currPay = state.payments[state.currentYear] || {};
  const unpaid = UNITS.filter(u => !MONTHS.some(m => currPay[u] && currPay[u][m]));
  const area = document.getElementById('unpaid-alert-area');
  area.innerHTML = unpaid.length > 0 ? `<div class="unpaid-alert-box"><div style="font-size:11px;color:var(--red);font-weight:700">⚠️ 尚未繳費住戶</div><div class="unpaid-list">${unpaid.map(u => `<span class="unpaid-tag">${u}</span>`).join('')}</div></div>` : '';
}

function getUnitCardHTML(u) {
  const p = state.payments[state.currentYear][u] || {};
  const pm = MONTHS.filter(m => p[m]);
  let dd = '<div style="font-size:11px;opacity:0.3">無紀錄</div>';
  if (pm.length > 0) dd = `<div class="latest-date-label">${p[pm[pm.length-1]].substring(5)}</div>`;
  const dots = MONTHS.map(m => `<div class="dot ${p[m]?'paid':''}"></div>`).join('');
  return `<div class="unit-card" onclick="openUnitSheet('${u}')"><div class="unit-name">${u}</div><div class="unit-dots">${dots}</div>${dd}</div>`;
}

function renderUnits() {
  document.getElementById('unit-grid').innerHTML = FLOORS.map(f => `<div class="floor-row">${getUnitCardHTML(f.L)}<div class="elevator-shaft">${ELEVATOR_SVG}</div>${getUnitCardHTML(f.R)}</div>`).join('');
}

function renderChart() {
  const currPay = state.payments[state.currentYear] || {};
  let f=0, p=0, n=0;
  UNITS.forEach(u => { const c = MONTHS.filter(m => currPay[u] && currPay[u][m]).length; if(c===12)f++; else if(c>0)p++; else n++; });
  const pF = (f/12)*100, pP = (p/12)*100;
  document.getElementById('pie-chart').innerHTML = `<circle r="16" cx="16" cy="16" fill="var(--red)" /><circle r="16" cx="16" cy="16" fill="transparent" stroke="var(--blue)" stroke-width="32" stroke-dasharray="${pP+pF} 100" /><circle r="16" cx="16" cy="16" fill="transparent" stroke="var(--green)" stroke-width="32" stroke-dasharray="${pF} 100" />`;
  document.getElementById('chart-legend').innerHTML = `<div class="legend-item"><div class="legend-color" style="background:var(--green)"></div>已結清: ${f}</div><div class="legend-item"><div class="legend-color" style="background:var(--blue)"></div>繳納中: ${p}</div><div class="legend-item"><div class="legend-color" style="background:var(--red)"></div>未開單: ${n}</div>`;
}

function renderRecords() {
  const yrRecs = state.records.filter(r => r.year === state.currentYear).reverse();
  document.getElementById('records-list').innerHTML = yrRecs.length === 0 ? '<div style="color:var(--text2);text-align:center;padding:20px">尚無紀錄</div>' : yrRecs.map(r => `<div class="record"><div class="record-top"><div>${r.desc}</div><div class="record-amount ${r.type}">${r.type==='income'?'＋':'－'} ${r.amount.toLocaleString()}</div></div><div style="font-size:11px;color:var(--text2);margin-top:4px">${r.date}</div></div>`).join('');
}

function shareStatus() {
  const now = new Date(); let text = `🏢 偉士大樓繳費報表 (${state.currentYear}/${now.getMonth()+1}/${now.getDate()})\n--------------------\n`;
  UNITS.forEach(u => { const p = state.payments[state.currentYear][u] || {}; const pm = MONTHS.filter(m => p[m]); text += pm.length > 0 ? `✅ ${u}：最新繳費 ${p[pm[pm.length-1]]}\n` : `❌ ${u}：尚未繳費\n`; });
  let tb = INIT_BALANCE; state.records.forEach(r => tb += (r.type === 'income' ? r.amount : -r.amount));
  text += `\n結餘：NT$ ${tb.toLocaleString()}`;
  if (navigator.share) navigator.share({ title: '報表', text: text }); else { navigator.clipboard.writeText(text); alert('已複製！'); }
}

let activeUnit = null;
function openUnitSheet(u) {
  activeUnit = u; document.getElementById('unit-sheet-title').textContent = `${state.currentYear} - ${u}`;
  const p = state.payments[state.currentYear][u] || {};
  document.getElementById('unit-month-grid').innerHTML = MONTHS.map(m => `<button class="month-btn ${p[m]?'paid':''}" onclick="toggleMonth('${m}')">${m}${p[m]?'<br><small>'+p[m].substring(5)+'</small>':''}</button>`).join('');
  document.getElementById('unit-overlay').classList.add('show');
}
function toggleMonth(m) {
  const yr = state.currentYear; if (!state.payments[yr][activeUnit]) state.payments[yr][activeUnit] = {};
  if (state.payments[yr][activeUnit][m]) { delete state.payments[yr][activeUnit][m]; state.records = state.records.filter(r => !(r.desc === `${activeUnit} ${yr} ${m} 管理費`)); } 
  else { const today = new Date().toISOString().split('T')[0]; state.payments[yr][activeUnit][m] = today; state.records.push({ id: state.nextId++, year: yr, type: 'income', date: today, desc: `${activeUnit} ${yr} ${m} 管理費`, amount: 1500 }); }
  saveData(); render(); openUnitSheet(activeUnit);
}

let activeType = 'income';
function openSheet(type) {
  if (type === 'version') { document.getElementById('version-overlay').classList.add('show'); return; }
  activeType = type; document.getElementById('record-sheet-title').textContent = type === 'income' ? '新增收入' : '新增支出';
  document.getElementById('rec-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('rec-desc').value = ''; document.getElementById('rec-amount').value = '';
  document.getElementById('record-overlay').classList.add('show');
}
function submitRecord() {
  const d = document.getElementById('rec-date').value, s = document.getElementById('rec-desc').value.trim(), a = parseInt(document.getElementById('rec-amount').value);
  if (!s || !a) return; state.records.push({ id: state.nextId++, year: state.currentYear, type: activeType, date: d, desc: s, amount: a });
  saveData(); render(); closeSheet('record');
}
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('tab-units').style.display = tab === 'units' ? 'block' : 'none';
  document.getElementById('tab-records').style.display = tab === 'records' ? 'block' : 'none';
}
function closeSheet(id) { document.getElementById(id+'-overlay').classList.remove('show'); }
function closeIfOutside(e, id) { if(e.target.id === id) closeSheet(id.replace('-overlay','')); }

loadData(); render(); updateWeather();
setInterval(() => {
  const now = new Date(); document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
  const wd = ['日','一','二','三','四','五','六'][now.getDay()];
  document.getElementById('datedisp').textContent = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} 週${wd}`;
}, 1000);
</script>
