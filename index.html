<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="偉士管委">
<link rel="manifest" href="manifest.json">
<title>偉士大樓管委費系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#c8a96e; --gold-light:#e8c98e; --gold-dim:#8a7148;
    --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
    --border:#30363d; --text:#e6edf3; --text2:#8b949e;
    --green:#3fb950; --green-bg:#0d2818;
    --red:#f85149; --red-bg:#2d1215;
    --blue:#58a6ff; --blue-bg:#0c1f35;
    --purple:#d8b4fe;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh}
  #header{padding:calc(var(--safe-top) + 10px) 16px 10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
  .header-row{display:flex;align-items:center;justify-content:space-between}
  .header-title{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:2px}
  .header-sub{font-size:11px;color:var(--text2);margin-top:1px;letter-spacing:1px}
  .header-datetime{text-align:right}
  .header-time{font-family:'DM Mono'; font-size:16px; color:var(--gold-light); letter-spacing:1px}
  .header-date{font-size:10px; color:var(--text2); margin-top:1px}
  .version-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:4px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .version-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:'DM Mono';font-size:10px;padding:3px 8px;cursor:pointer}
  .share-btn{background:var(--blue-bg);border:1px solid var(--blue);color:var(--blue);border-radius:6px;font-size:10px;padding:3px 10px;cursor:pointer;font-weight:600}
  #balance-hero{background:linear-gradient(135deg,#161b22 0%,#1a1f2a 100%);border-bottom:1px solid var(--border);padding:16px 16px 14px;flex-shrink:0}
  .balance-label{font-size:11px;color:var(--text2);letter-spacing:2px;margin-bottom:4px}
  .balance-amount{font-family:'DM Mono',monospace;font-size:36px;color:var(--gold-light);line-height:1}
  .balance-amount span{font-size:18px;color:var(--gold-dim);margin-right:4px}
  .balance-row{display:flex;gap:20px;margin-top:12px}
  .balance-stat{flex:1}
  .balance-stat-label{font-size:10px;color:var(--text2)}
  .balance-stat-val{font-family:'DM Mono';font-size:13px;margin-top:2px}
  #tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
  .tab{flex:1;padding:11px 0;font-size:13px;font-weight:500;color:var(--text2);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  #content{flex:1;overflow-y:auto;padding-bottom:calc(var(--safe-bot) + 120px)}
  .section{padding:14px 16px 0}
  .section-title{font-size:11px;color:var(--text2);letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .record{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
  .record-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .record-desc{font-size:14px;font-weight:500;line-height:1.4;flex:1}
  .record-amount{font-family:'DM Mono';font-size:16px;font-weight:500}
  .record-amount.income{color:var(--green)}
  .record-amount.expense{color:var(--red)}
  .record-meta{display:flex;align-items:center;gap:8px;margin-top:6px}
  .record-date{font-size:11px;color:var(--text2);font-family:'DM Mono'}
  .record-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
  .badge-income{background:var(--green-bg);color:var(--green)}
  .badge-expense{background:var(--red-bg);color:var(--red)}
  .record-balance{font-size:11px;color:var(--text2);margin-top:4px;font-family:'DM Mono'}
  .record-actions{display:flex;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
  .rec-btn{flex:1;padding:8px 0;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer}
  .unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px}
  .unit-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 8px;text-align:center;cursor:pointer}
  .unit-card.all-paid{border-color:var(--green);background:var(--green-bg)}
  .unit-name{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--gold-light)}
  .unit-dots{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-bottom:12px}
  .dot{width:6px;height:6px;border-radius:50%}
  .dot.paid{background:var(--green)}
  .dot.unpaid{background:var(--border)}
  
  /* 紫色加大的日期標籤 */
  .latest-date-label { 
    font-family: 'DM Mono';
    font-size: 15px; 
    font-weight: 700;
    color: var(--purple);
    background: rgba(216,180,254,0.1);
    padding: 4px 10px;
    border-radius: 6px;
    display: inline-block;
  }
  .no-date-label { font-size: 11px; color: var(--text2); opacity: 0.5; }

  #fab-area{position:fixed;left:0;right:0;bottom:calc(var(--safe-bot) + 38px);display:flex;justify-content:center;gap:12px;padding:0 16px}
  .fab{flex:1;max-width:180px;padding:14px 0;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer}
  .fab-income{background:var(--green);color:#0d1117}
  .fab-expense{background:var(--red);color:#fff}
  
  .unpaid-alert-box { background: var(--red-bg); border: 1px solid var(--red); border-radius: 10px; padding: 12px; margin: 0 16px 12px; }
  .unpaid-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .unpaid-tag { font-size: 12px; border: 1px solid rgba(248,81,73,0.3); color: var(--red); padding: 2px 8px; border-radius: 4px; }

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
  .overlay.show{opacity:1;pointer-events:all}
  .sheet{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:0 16px calc(var(--safe-bot) + 16px);width:100%;max-height:90vh;overflow-y:auto;transform:translateY(40px);transition:transform .3s}
  .overlay.show .sheet{transform:translateY(0)}
  .sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
  .sheet-title{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:var(--gold);margin-bottom:18px;text-align:center}
  .form-group{margin-bottom:14px}
  .form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
  .form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none}
  .form-btns{display:flex;gap:10px;margin-top:20px}
  .btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}
  .btn-cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
  .btn-ok{background:var(--gold);color:var(--bg)}
  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none}
  .confirm-overlay.show{opacity:1;pointer-events:all}
  .confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:320px}
  .month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .month-btn{padding:10px 4px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;text-align:center}
  .month-btn.paid{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:600}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-row">
      <div>
        <div class="header-title">偉士大樓</div>
        <div class="header-sub">管理委員費收支系統</div>
      </div>
      <div class="header-datetime">
        <div class="header-time" id="clock">--:--:--</div>
        <div class="header-date" id="datedisp">----/--/--</div>
      </div>
    </div>
  </div>

  <div class="version-bar">
    <button class="version-btn" onclick="openVersionSheet()">v1.8.2 · 更新履歷</button>
    <button class="share-btn" onclick="shareStatus()">📤 分享報表</button>
  </div>

  <div id="balance-hero">
    <div class="balance-label">目前結餘</div>
    <div class="balance-amount"><span>NT$</span><span id="balance-num">97,246</span></div>
    <div class="balance-row">
      <div class="balance-stat">
        <div class="balance-stat-label">總收入</div>
        <div class="balance-stat-val" id="total-income-disp" style="color:var(--green)">NT$ 0</div>
      </div>
      <div class="balance-stat">
        <div class="balance-stat-label">總支出</div>
        <div class="balance-stat-val" id="total-expense-disp" style="color:var(--red)">NT$ 0</div>
      </div>
      <div class="balance-stat">
        <div class="balance-stat-label">繳費戶</div>
        <div class="balance-stat-val" id="paid-units-disp" style="color:var(--gold)">0 / 12</div>
      </div>
    </div>
  </div>

  <div id="tabs">
    <div class="tab active" onclick="switchTab('records')">帳務記錄</div>
    <div class="tab" onclick="switchTab('units')">住戶管理</div>
    <div class="tab" onclick="switchTab('history')">收支明細</div>
  </div>

  <div id="content">
    <div id="tab-records"><div class="section"><div class="section-title">最新帳務</div><div id="records-list"></div></div></div>
    <div id="tab-units" style="display:none">
      <div id="unpaid-alert-area"></div>
      <div class="section"><div class="section-title">住戶最近繳費日</div><div class="unit-grid" id="unit-grid"></div></div>
    </div>
    <div id="tab-history" style="display:none"><div class="section"><div class="section-title">全期收支明細</div><div id="history-list"></div></div></div>
  </div>

  <div id="fab-area">
    <button class="fab fab-income" onclick="openSheet('income')">＋ 收入</button>
    <button class="fab fab-expense" onclick="openSheet('expense')">－ 支出</button>
  </div>
</div>

<div class="overlay" id="income-overlay" onclick="closeIfOutside(event,'income-overlay')"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-title">新增收入</div><div class="form-group"><label class="form-label">日期</label><input type="date" class="form-input" id="income-date"></div><div class="form-group"><label class="form-label">說明</label><input type="text" class="form-input" id="income-desc"></div><div class="form-group"><label class="form-label">金額</label><input type="number" class="form-input" id="income-amount" inputmode="numeric"></div><div class="form-btns"><button class="btn btn-cancel" onclick="closeSheet('income')">取消</button><button class="btn btn-ok" onclick="submitRecord('income')">確認</button></div></div></div>
<div class="overlay" id="expense-overlay" onclick="closeIfOutside(event,'expense-overlay')"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-title">新增支出</div><div class="form-group"><label class="form-label">日期</label><input type="date" class="form-input" id="expense-date"></div><div class="form-group"><label class="form-label">說明</label><input type="text" class="form-input" id="expense-desc"></div><div class="form-group"><label class="form-label">金額</label><input type="number" class="form-input" id="expense-amount" inputmode="numeric"></div><div class="form-btns"><button class="btn btn-cancel" onclick="closeSheet('expense')">取消</button><button class="btn btn-ok" onclick="submitRecord('expense')" style="background:var(--red);color:#fff">確認</button></div></div></div>
<div class="overlay" id="unit-overlay" onclick="closeIfOutside(event,'unit-overlay')"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-title" id="unit-sheet-title">繳費清單</div><div class="month-grid" id="unit-month-grid"></div><button class="btn btn-cancel" style="width:100%" onclick="closeSheet('unit')">關閉</button></div></div>
<div class="overlay" id="date-picker-overlay" onclick="closeIfOutside(event,'date-picker-overlay')"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-title">選擇日期</div><div class="form-group"><input type="date" class="form-input" id="constrained-date"></div><div class="form-btns"><button class="btn btn-cancel" onclick="closeSheet('date-picker')">取消</button><button class="btn btn-ok" id="date-picker-confirm-btn">確認</button></div></div></div>
<div class="confirm-overlay" id="confirm-overlay"><div class="confirm-box"><div class="confirm-title" id="confirm-title">確認</div><div class="confirm-msg" id="confirm-msg"></div><div class="confirm-btns"><button class="btn btn-cancel" onclick="confirmNo()">取消</button><button class="btn btn-ok" id="confirm-yes-btn" onclick="confirmYes()">確認</button></div></div></div>

<script>
const UNIT_LEFT  = ['426-6','426-5','426-4','426-3','426-2','426-1'];
const UNIT_RIGHT = ['424-6','424-5','424-4','424-3','424-2','424-1'];
const UNITS = [];
for (let i = 0; i < 6; i++) { UNITS.push(UNIT_LEFT[i]); UNITS.push(UNIT_RIGHT[i]); }
const INIT_BALANCE = 97246;
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function loadState() {
  try { const s = localStorage.getItem('weishi-state-v2'); if (s) return JSON.parse(s); } catch(e) {}
  const payments = {}; UNITS.forEach(u => { payments[u] = {}; MONTHS.forEach(m => payments[u][m] = null); });
  return { records: [], payments, nextId: 1 };
}
let state = loadState();

function saveState() { localStorage.setItem('weishi-state-v2', JSON.stringify(state)); }

function totalIncome()  { return state.records.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0); }
function totalExpense() { return state.records.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0); }
function balance()      { return INIT_BALANCE + totalIncome() - totalExpense(); }
function paidUnits()    { return UNITS.filter(u => MONTHS.some(m => state.payments[u] && state.payments[u][m])).length; }

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  document.getElementById('datedisp').textContent = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} 週${['日','一','二','三','四','五','六'][now.getDay()]}`;
}
setInterval(updateClock, 1000); updateClock();

function render() {
  document.getElementById('balance-num').textContent = balance().toLocaleString('zh-TW');
  document.getElementById('total-income-disp').textContent = 'NT$ ' + totalIncome().toLocaleString();
  document.getElementById('total-expense-disp').textContent = 'NT$ ' + totalExpense().toLocaleString();
  document.getElementById('paid-units-disp').textContent = paidUnits() + ' / 12';
  renderRecords();
  renderUnits();
  renderHistory();
  renderUnpaidAlert();
}

function renderUnpaidAlert() {
  const unpaid = UNITS.filter(u => !MONTHS.some(m => state.payments[u] && state.payments[u][m]));
  const area = document.getElementById('unpaid-alert-area');
  area.innerHTML = unpaid.length > 0 ? `<div class="unpaid-alert-box"><div style="font-size:11px;color:var(--red);font-weight:700">⚠️ 尚未繳費住戶</div><div class="unpaid-list">${unpaid.map(u => `<span class="unpaid-tag">${u}</span>`).join('')}</div></div>` : '';
}

function renderRecords() {
  const el = document.getElementById('records-list');
  const records = [...state.records].reverse().slice(0,30);
  if (!records.length) { el.innerHTML = '<div class="empty">尚無帳務記錄</div>'; return; }
  el.innerHTML = records.map(r => `
    <div class="record">
      <div class="record-top"><div class="record-desc">${r.desc}</div><div class="record-amount ${r.type}">${r.type==='income'?'＋':'－'} ${r.amount.toLocaleString()}</div></div>
      <div class="record-meta"><span class="record-date">${r.date}</span><span class="record-badge badge-${r.type}">${r.cat || (r.type==='income'?'收入':'支出')}</span></div>
      <div class="record-balance">結餘：NT$ ${r.balanceAfter.toLocaleString()}</div>
      <div class="record-actions"><button class="rec-btn" onclick="editRecord(${r.id})">編輯</button><button class="rec-btn" onclick="deleteRecord(${r.id})" style="color:var(--red)">刪除</button></div>
    </div>`).join('');
}

function renderUnits() {
  const el = document.getElementById('unit-grid');
  el.innerHTML = UNITS.map(u => {
    const p = state.payments[u] || {};
    const paidMonths = MONTHS.filter(m => p[m]);
    let dateDisp = '<div class="no-date-label">無紀錄</div>';
    if (paidMonths.length > 0) {
      const lastDate = p[paidMonths[paidMonths.length-1]];
      dateDisp = `<div class="latest-date-label">${lastDate.substring(5)}</div>`;
    }
    const dots = MONTHS.map(m => `<div class="dot ${p[m]?'paid':'unpaid'}"></div>`).join('');
    return `<div class="unit-card" onclick="openUnitSheet('${u}')"><div class="unit-name">${u}</div><div class="unit-dots">${dots}</div>${dateDisp}</div>`;
  }).join('');
}

function renderHistory() {
  const el = document.getElementById('history-list');
  const all = [...state.records].reverse();
  if (!all.length) { el.innerHTML = '<div class="empty">尚無明細</div>'; return; }
  el.innerHTML = all.map(r => `
    <div class="record" style="padding:10px; margin-bottom:8px;">
      <div style="display:flex; justify-content:space-between">
        <div style="font-size:13px">${r.desc}</div>
        <div style="font-family:'DM Mono'; font-size:14px; color:${r.type==='income'?'var(--green)':'var(--red)'}">${r.type==='income'?'＋':'－'}${r.amount.toLocaleString()}</div>
      </div>
      <div style="font-size:10px; color:var(--text2); margin-top:4px">${r.date} · 結餘：${r.balanceAfter.toLocaleString()}</div>
    </div>`).join('');
}

function shareStatus() {
  const now = new Date();
  let text = `🏢 偉士大樓繳費報表 (${now.getMonth()+1}/${now.getDate()})\n--------------------\n`;
  UNITS.forEach(u => {
    const p = state.payments[u] || {};
    const paidM = MONTHS.filter(m => p[m]);
    if (paidM.length > 0) {
      const lastDate = p[paidM[paidM.length-1]];
      text += `✅ ${u}：最新繳費日 ${lastDate}\n`;
    } else {
      text += `❌ ${u}：尚未繳費\n`;
    }
  });
  text += `\n結餘：NT$ ${balance().toLocaleString()}`;
  if (navigator.share) navigator.share({ title: '偉士大樓報表', text: text });
  else { navigator.clipboard.writeText(text); alert('報表已複製！'); }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['records','units','history'][i] === tab));
  ['records','units','history'].forEach(t => document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none');
  document.getElementById('fab-area').style.display = tab === 'units' ? 'none' : 'flex';
}

let editingId = null;
function openSheet(type, record) {
  editingId = record ? record.id : null;
  const today = new Date().toISOString().split('T')[0];
  document.getElementById(type+'-date').value = record ? record.date : today;
  document.getElementById(type+'-desc').value = record ? record.desc : '';
  document.getElementById(type+'-amount').value = record ? record.amount : '';
  document.getElementById(type+'-overlay').classList.add('show');
}
function closeSheet(type) { document.getElementById(type+'-overlay').classList.remove('show'); }
function closeIfOutside(e, id) { if (e.target.id === id) closeSheet(id.replace('-overlay','')); }

function editRecord(id) { const r = state.records.find(x => x.id === id); if (r) openSheet(r.type, r); }
function submitRecord(type) {
  const date = document.getElementById(type+'-date').value;
  const desc = document.getElementById(type+'-desc').value.trim();
  const amount = parseInt(document.getElementById(type+'-amount').value);
  if (!date || !desc || !amount || amount <= 0) return alert('請填寫完整');
  if (editingId !== null) {
    const r = state.records.find(x => x.id === editingId);
    if (r) { r.date=date; r.desc=desc; r.amount=amount; }
  } else state.records.push({ id:state.nextId++, type, date, desc, amount, balanceAfter:0 });
  let b = INIT_BALANCE; state.records.forEach(rec => { b += rec.type==='income' ? rec.amount : -rec.amount; rec.balanceAfter = b; });
  saveState(); closeSheet(type); render();
}

function deleteRecord(id) {
  showConfirm('刪除確認', '確定要刪除這筆紀錄嗎？', () => {
    state.records = state.records.filter(x => x.id !== id);
    let b = INIT_BALANCE; state.records.forEach(rec => { b += rec.type==='income' ? rec.amount : -rec.amount; rec.balanceAfter = b; });
    saveState(); render();
  }, true);
}

let activeUnit = null;
function openUnitSheet(unit) {
  activeUnit = unit; document.getElementById('unit-sheet-title').textContent = unit;
  const p = state.payments[unit] || {};
  document.getElementById('unit-month-grid').innerHTML = MONTHS.map(m => {
    const isPaid = !!p[m];
    return `<button class="month-btn ${isPaid?'paid':''}" onclick="toggleMonth('${unit}','${m}')">${m}${isPaid?'<br><small style="color:var(--purple)">✓ '+p[m].substring(5)+'</small>':''}</button>`;
  }).join('');
  document.getElementById('unit-overlay').classList.add('show');
}

function toggleMonth(unit, month) {
  const isPaid = !!state.payments[unit][month];
  if (isPaid) showConfirm('取消確認', `取消 ${unit} ${month} 繳費？`, () => { state.payments[unit][month] = null; saveState(); render(); openUnitSheet(unit); }, true);
  else {
    const now = new Date(); const mIdx = MONTHS.indexOf(month);
    const dateInput = document.getElementById('constrained-date');
    dateInput.value = now.toISOString().split('T')[0];
    document.getElementById('date-picker-confirm-btn').onclick = () => {
      state.payments[unit][month] = dateInput.value; saveState(); render(); openUnitSheet(unit); closeSheet('date-picker');
    };
    openSheet('date-picker');
  }
}

let confirmCallback = null;
function showConfirm(title, msg, cb, isDanger=false) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  const btn = document.getElementById('confirm-yes-btn');
  btn.style.background = isDanger ? 'var(--red)' : 'var(--gold)';
  btn.style.color = isDanger ? '#fff' : 'var(--bg)';
  confirmCallback = cb; document.getElementById('confirm-overlay').classList.add('show');
}
function confirmNo() { document.getElementById('confirm-overlay').classList.remove('show'); }
function confirmYes() { document.getElementById('confirm-overlay').classList.remove('show'); if(confirmCallback) confirmCallback(); }

render();
</script>
</body>
</html>
