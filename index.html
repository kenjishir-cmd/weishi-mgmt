<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="偉士管委">
<link rel="manifest" href="manifest.json">
<title>偉士大樓管委費系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8a96e;
    --gold-light: #e8c98e;
    --gold-dim: #8a7148;
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --green: #3fb950;
    --green-bg: #0d2818;
    --red: #f85149;
    --red-bg: #2d1215;
    --blue: #58a6ff;
    --blue-bg: #0c1f35;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }
  
  /* APP SHELL */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  
  /* HEADER */
  #header {
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-title { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }
  .header-sub { font-size: 11px; color: var(--text2); margin-top: 1px; letter-spacing: 1px; }

  /* BALANCE HERO */
  #balance-hero {
    background: linear-gradient(135deg, #161b22 0%, #1a1f2a 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 16px 16px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  #balance-hero::before {
    content: '¥';
    position: absolute; right: -10px; top: -20px;
    font-family: 'DM Mono'; font-size: 120px; color: var(--gold);
    opacity: 0.04; pointer-events: none;
  }
  .balance-label { font-size: 11px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .balance-amount { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 400; color: var(--gold-light); line-height: 1; }
  .balance-amount span { font-size: 18px; color: var(--gold-dim); margin-right: 4px; }
  .balance-row { display: flex; gap: 20px; margin-top: 12px; }
  .balance-stat { flex: 1; }
  .balance-stat-label { font-size: 10px; color: var(--text2); letter-spacing: 1px; }
  .balance-stat-val { font-family: 'DM Mono'; font-size: 13px; margin-top: 2px; }

  /* TABS */
  #tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { flex: 1; padding: 11px 0; font-size: 13px; font-weight: 500; color: var(--text2); text-align: center; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; letter-spacing: 1px; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab:active { background: var(--bg3); }

  /* CONTENT */
  #content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bot) + 80px); }
  
  /* SECTION */
  .section { padding: 14px 16px 0; }
  .section-title { font-size: 11px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  /* RECORD CARD */
  .record { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative; }
  .record-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .record-desc { font-size: 14px; font-weight: 500; line-height: 1.4; flex: 1; }
  .record-amount { font-family: 'DM Mono'; font-size: 16px; font-weight: 500; white-space: nowrap; }
  .record-amount.income { color: var(--green); }
  .record-amount.expense { color: var(--red); }
  .record-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .record-date { font-size: 11px; color: var(--text2); font-family: 'DM Mono'; }
  .record-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; letter-spacing: 0.5px; }
  .badge-income { background: var(--green-bg); color: var(--green); }
  .badge-expense { background: var(--red-bg); color: var(--red); }
  .record-balance { font-size: 11px; color: var(--text2); margin-top: 4px; font-family: 'DM Mono'; }
  .record-delete { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text2); font-size: 16px; cursor: pointer; padding: 4px 6px; border-radius: 6px; }
  .record-delete:active { background: var(--red-bg); color: var(--red); }

  /* UNIT GRID */
  .unit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 14px 16px 0; }
  .unit-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .unit-card:active { transform: scale(0.96); }
  .unit-card.all-paid { border-color: var(--green); background: var(--green-bg); }
  .unit-card.has-unpaid { border-color: #f85149; }
  .unit-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; letter-spacing: 1px; }
  .unit-status { font-size: 10px; color: var(--text2); }
  .unit-status.ok { color: var(--green); }
  .unit-status.bad { color: var(--red); }
  .unit-dots { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 2px; }
  .dot.paid { background: var(--green); }
  .dot.unpaid { background: var(--border); }

  /* FAB */
  #fab-area { position: fixed; bottom: calc(var(--safe-bot) + 16px); left: 0; right: 0; display: flex; justify-content: center; gap: 12px; z-index: 50; padding: 0 16px; }
  .fab { flex: 1; max-width: 180px; padding: 14px 0; border: none; border-radius: 14px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .fab-income { background: var(--green); color: #0d1117; }
  .fab-income:active { transform: scale(0.97); background: #2ea043; }
  .fab-expense { background: var(--red); color: #fff; }
  .fab-expense:active { transform: scale(0.97); background: #da3633; }

  /* MODAL OVERLAY */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .overlay.show { opacity: 1; pointer-events: all; }
  .sheet { background: var(--bg2); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); padding: 0 16px calc(var(--safe-bot) + 16px); width: 100%; max-height: 90vh; overflow-y: auto; transform: translateY(40px); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .overlay.show .sheet { transform: translateY(0); }
  .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 16px; }
  .sheet-title { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 700; color: var(--gold); margin-bottom: 18px; text-align: center; letter-spacing: 1px; }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 15px; outline: none; -webkit-appearance: none; }
  .form-input:focus { border-color: var(--gold); }
  select.form-input { appearance: none; }
  .form-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; }
  .btn-cancel { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-cancel:active { background: var(--border); }
  .btn-ok { background: var(--gold); color: var(--bg); }
  .btn-ok:active { background: var(--gold-dim); }
  .btn-ok.danger { background: var(--red); color: #fff; }

  /* CONFIRM DIALOG */
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .confirm-overlay.show { opacity: 1; pointer-events: all; }
  .confirm-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 320px; transform: scale(0.92); transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  .confirm-overlay.show .confirm-box { transform: scale(1); }
  .confirm-title { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 700; color: var(--gold); text-align: center; margin-bottom: 8px; }
  .confirm-msg { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.6; margin-bottom: 20px; }
  .confirm-btns { display: flex; gap: 10px; }

  /* UNIT DETAIL SHEET */
  .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .month-btn { padding: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-family: 'Noto Sans TC', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .month-btn.paid { background: var(--green-bg); border-color: var(--green); color: var(--green); font-weight: 600; }
  .month-btn:active { transform: scale(0.95); }

  /* HISTORY TAB */
  .history-sum { display: flex; gap: 10px; padding: 14px 16px 0; }
  .sum-card { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .sum-card-label { font-size: 10px; color: var(--text2); letter-spacing: 1px; margin-bottom: 4px; }
  .sum-card-val { font-family: 'DM Mono'; font-size: 16px; font-weight: 500; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 14px; }

  /* SCROLLBAR */
  #content::-webkit-scrollbar { width: 3px; }
  #content::-webkit-scrollbar-track { background: transparent; }
  #content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .record { animation: fadeIn 0.2s ease; }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="header-title">偉士大樓</div>
    <div class="header-sub">管理委員費收支系統</div>
  </div>

  <div id="balance-hero">
    <div class="balance-label">目前結餘</div>
    <div class="balance-amount"><span>NT$</span><span id="balance-num">97,246</span></div>
    <div class="balance-row">
      <div class="balance-stat">
        <div class="balance-stat-label">總收入</div>
        <div class="balance-stat-val" id="total-income-disp" style="color:var(--green)">NT$ 0</div>
      </div>
      <div class="balance-stat">
        <div class="balance-stat-label">總支出</div>
        <div class="balance-stat-val" id="total-expense-disp" style="color:var(--red)">NT$ 0</div>
      </div>
      <div class="balance-stat">
        <div class="balance-stat-label">繳費戶</div>
        <div class="balance-stat-val" id="paid-units-disp" style="color:var(--gold)">0 / 12</div>
      </div>
    </div>
  </div>

  <div id="tabs">
    <div class="tab active" onclick="switchTab('records')">帳務記錄</div>
    <div class="tab" onclick="switchTab('units')">住戶管理</div>
    <div class="tab" onclick="switchTab('history')">收支明細</div>
  </div>

  <div id="content">
    <!-- Records Tab -->
    <div id="tab-records">
      <div class="section">
        <div class="section-title">最新帳務</div>
        <div id="records-list"></div>
      </div>
    </div>

    <!-- Units Tab -->
    <div id="tab-units" style="display:none">
      <div class="unit-grid" id="unit-grid"></div>
    </div>

    <!-- History Tab -->
    <div id="tab-history" style="display:none">
      <div class="history-sum">
        <div class="sum-card">
          <div class="sum-card-label">期初結餘</div>
          <div class="sum-card-val" style="color:var(--gold)">NT$ 97,246</div>
        </div>
        <div class="sum-card">
          <div class="sum-card-label">現在結餘</div>
          <div class="sum-card-val" id="hist-balance" style="color:var(--gold-light)">NT$ 97,246</div>
        </div>
      </div>
      <div class="section" style="margin-top:14px">
        <div class="section-title">全部紀錄</div>
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <div id="fab-area">
    <button class="fab fab-income" onclick="openSheet('income')">＋ 收入</button>
    <button class="fab fab-expense" onclick="openSheet('expense')">－ 支出</button>
  </div>
</div>

<!-- Income Sheet -->
<div class="overlay" id="income-overlay" onclick="closeIfOutside(event,'income-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">新增收入</div>
    <div class="form-group">
      <label class="form-label">日期</label>
      <input type="date" class="form-input" id="income-date">
    </div>
    <div class="form-group">
      <label class="form-label">說明</label>
      <input type="text" class="form-input" id="income-desc" placeholder="例：115年1月管委費收入">
    </div>
    <div class="form-group">
      <label class="form-label">類別</label>
      <select class="form-input" id="income-cat">
        <option>管委費收入</option>
        <option>停車費</option>
        <option>其他收入</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">金額（NT$）</label>
      <input type="number" class="form-input" id="income-amount" placeholder="0" inputmode="numeric">
    </div>
    <div class="form-btns">
      <button class="btn btn-cancel" onclick="closeSheet('income')">取消</button>
      <button class="btn btn-ok" onclick="confirmAdd('income')">確認新增</button>
    </div>
  </div>
</div>

<!-- Expense Sheet -->
<div class="overlay" id="expense-overlay" onclick="closeIfOutside(event,'expense-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">新增支出</div>
    <div class="form-group">
      <label class="form-label">日期</label>
      <input type="date" class="form-input" id="expense-date">
    </div>
    <div class="form-group">
      <label class="form-label">說明</label>
      <input type="text" class="form-input" id="expense-desc" placeholder="例：電梯保養費">
    </div>
    <div class="form-group">
      <label class="form-label">類別</label>
      <select class="form-input" id="expense-cat">
        <option>清潔維護</option>
        <option>電費</option>
        <option>水費</option>
        <option>電梯保養</option>
        <option>安全消防</option>
        <option>修繕工程</option>
        <option>保險</option>
        <option>綠化植栽</option>
        <option>棚架工程</option>
        <option>其他支出</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">金額（NT$）</label>
      <input type="number" class="form-input" id="expense-amount" placeholder="0" inputmode="numeric">
    </div>
    <div class="form-btns">
      <button class="btn btn-cancel" onclick="closeSheet('expense')">取消</button>
      <button class="btn btn-ok btn danger" style="background:var(--red);color:#fff" onclick="confirmAdd('expense')">確認新增</button>
    </div>
  </div>
</div>

<!-- Unit Detail Sheet -->
<div class="overlay" id="unit-overlay" onclick="closeIfOutside(event,'unit-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="unit-sheet-title">X戶 繳費狀況</div>
    <div class="section-title" style="margin-bottom:12px">點擊月份切換繳費狀態</div>
    <div class="month-grid" id="unit-month-grid"></div>
    <button class="btn btn-cancel" style="width:100%;margin-top:8px" onclick="closeSheet('unit')">關閉</button>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">確認操作</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="btn btn-cancel" onclick="confirmNo()">取消</button>
      <button class="btn btn-ok" id="confirm-yes-btn" onclick="confirmYes()">確認</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────
const INIT_BALANCE = 97246;
const MONTHLY_FEE = 9000; // 12戶 × 750？ 可調整。這裡每戶每月收固定比例
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const UNITS = Array.from({length:12}, (_,i) => `${i+1}戶`);

function loadState() {
  try {
    const s = localStorage.getItem('weishi-state');
    if (s) return JSON.parse(s);
  } catch(e) {}
  // default
  const payments = {};
  UNITS.forEach(u => { payments[u] = {}; MONTHS.forEach(m => payments[u][m] = false); });
  return { records: [], payments, nextId: 1 };
}

let state = loadState();

function saveState() {
  localStorage.setItem('weishi-state', JSON.stringify(state));
}

// ── COMPUTED ───────────────────────────────────────────
function totalIncome() { return state.records.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0); }
function totalExpense() { return state.records.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0); }
function balance() { return INIT_BALANCE + totalIncome() - totalExpense(); }
function paidUnits() {
  return UNITS.filter(u => MONTHS.some(m => state.payments[u][m])).length;
}

function fmt(n) { return 'NT$ ' + Math.abs(n).toLocaleString('zh-TW'); }

// ── RENDER ─────────────────────────────────────────────
function render() {
  // balance
  const b = balance();
  document.getElementById('balance-num').textContent = b.toLocaleString('zh-TW');
  document.getElementById('balance-num').style.color = b >= 0 ? 'var(--gold-light)' : 'var(--red)';
  document.getElementById('total-income-disp').textContent = fmt(totalIncome());
  document.getElementById('total-expense-disp').textContent = fmt(totalExpense());
  document.getElementById('paid-units-disp').textContent = paidUnits() + ' / 12';
  document.getElementById('hist-balance').textContent = fmt(b);

  renderRecords();
  renderUnits();
  renderHistory();
}

function renderRecords() {
  const el = document.getElementById('records-list');
  const records = [...state.records].reverse().slice(0, 30);
  if (!records.length) { el.innerHTML = '<div class="empty">尚無帳務記錄<br><small>點下方按鈕新增收支</small></div>'; return; }
  el.innerHTML = records.map(r => `
    <div class="record">
      <button class="record-delete" onclick="deleteRecord(${r.id})">✕</button>
      <div class="record-top">
        <div class="record-desc">${r.desc}</div>
        <div class="record-amount ${r.type}">${r.type==='income'?'＋':'－'} ${r.amount.toLocaleString()}</div>
      </div>
      <div class="record-meta">
        <span class="record-date">${r.date}</span>
        <span class="record-badge badge-${r.type}">${r.cat}</span>
      </div>
      <div class="record-balance">結餘：NT$ ${r.balanceAfter.toLocaleString()}</div>
    </div>
  `).join('');
}

function renderUnits() {
  const el = document.getElementById('unit-grid');
  el.innerHTML = UNITS.map(u => {
    const paid = MONTHS.filter(m => state.payments[u][m]).length;
    const allPaid = paid === 12;
    const dots = MONTHS.map(m => `<div class="dot ${state.payments[u][m]?'paid':'unpaid'}"></div>`).join('');
    return `
      <div class="unit-card ${allPaid?'all-paid':paid>0?'':'has-unpaid'}" onclick="openUnitSheet('${u}')">
        <div class="unit-name">${u}</div>
        <div class="unit-dots">${dots}</div>
        <div class="unit-status ${allPaid?'ok':paid===0?'bad':''}">${allPaid?'全繳清':paid===0?'未繳費':paid+'/12月'}</div>
      </div>
    `;
  }).join('');
}

function renderHistory() {
  const el = document.getElementById('history-list');
  const all = [...state.records].reverse();
  if (!all.length) { el.innerHTML = '<div class="empty">尚無紀錄</div>'; return; }
  el.innerHTML = all.map(r => `
    <div class="record">
      <div class="record-top">
        <div class="record-desc">${r.desc}</div>
        <div class="record-amount ${r.type}">${r.type==='income'?'＋':'－'} ${r.amount.toLocaleString()}</div>
      </div>
      <div class="record-meta">
        <span class="record-date">${r.date}</span>
        <span class="record-badge badge-${r.type}">${r.cat}</span>
      </div>
      <div class="record-balance">結餘：NT$ ${r.balanceAfter.toLocaleString()}</div>
    </div>
  `).join('');
}

// ── TABS ───────────────────────────────────────────────
let currentTab = 'records';
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['records','units','history'][i] === tab);
  });
  ['records','units','history'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? '' : 'none';
  });
  currentTab = tab;
  const fabArea = document.getElementById('fab-area');
  fabArea.style.display = tab === 'units' ? 'none' : 'flex';
}

// ── SHEETS ─────────────────────────────────────────────
function openSheet(type) {
  if (type === 'income' || type === 'expense') {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById(type+'-date').value = today;
    document.getElementById(type+'-desc').value = '';
    document.getElementById(type+'-amount').value = '';
  }
  document.getElementById(type+'-overlay').classList.add('show');
}

function closeSheet(type) {
  document.getElementById(type+'-overlay').classList.remove('show');
}

function closeIfOutside(e, id) {
  if (e.target.id === id) closeSheet(id.replace('-overlay',''));
}

// Unit Sheet
let activeUnit = null;
function openUnitSheet(unit) {
  activeUnit = unit;
  document.getElementById('unit-sheet-title').textContent = unit + ' 繳費狀況';
  renderUnitMonths(unit);
  document.getElementById('unit-overlay').classList.add('show');
}

function renderUnitMonths(unit) {
  const grid = document.getElementById('unit-month-grid');
  grid.innerHTML = MONTHS.map(m => `
    <button class="month-btn ${state.payments[unit][m]?'paid':''}" onclick="toggleMonthConfirm('${unit}','${m}')">
      ${m}${state.payments[unit][m]?'<br>✓':''}
    </button>
  `).join('');
}

function toggleMonthConfirm(unit, month) {
  const isPaid = state.payments[unit][month];
  showConfirm(
    isPaid ? '取消繳費' : '確認繳費',
    `${unit} ${month}\n${isPaid ? '標記為【未繳】？' : '標記為【已繳】？'}`,
    () => {
      state.payments[unit][month] = !isPaid;
      saveState();
      renderUnitMonths(unit);
      render();
    },
    isPaid ? true : false
  );
}

// ── CONFIRM ────────────────────────────────────────────
let confirmCallback = null;
function showConfirm(title, msg, cb, isDanger=false) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  const yesBtn = document.getElementById('confirm-yes-btn');
  yesBtn.style.background = isDanger ? 'var(--red)' : 'var(--gold)';
  yesBtn.style.color = isDanger ? '#fff' : 'var(--bg)';
  confirmCallback = cb;
  document.getElementById('confirm-overlay').classList.add('show');
}
function confirmNo() { document.getElementById('confirm-overlay').classList.remove('show'); confirmCallback = null; }
function confirmYes() { document.getElementById('confirm-overlay').classList.remove('show'); if(confirmCallback) confirmCallback(); confirmCallback = null; }

// ── ADD RECORD ────────────────────────────────────────
function confirmAdd(type) {
  const date = document.getElementById(type+'-date').value;
  const desc = document.getElementById(type+'-desc').value.trim();
  const cat = document.getElementById(type+'-cat').value;
  const amount = parseInt(document.getElementById(type+'-amount').value);
  if (!date || !desc || !amount || amount <= 0) {
    alert('請填寫完整資料');
    return;
  }
  const sign = type === 'income' ? '＋' : '－';
  showConfirm(
    type === 'income' ? '確認新增收入' : '確認新增支出',
    `${desc}\n${sign} NT$ ${amount.toLocaleString()}\n日期：${date}\n類別：${cat}`,
    () => {
      const bal = balance() + (type==='income' ? amount : -amount);
      state.records.push({ id: state.nextId++, type, date, desc, cat, amount, balanceAfter: bal });
      saveState();
      closeSheet(type);
      render();
    },
    type === 'expense'
  );
}

// ── DELETE ─────────────────────────────────────────────
function deleteRecord(id) {
  const r = state.records.find(x => x.id === id);
  if (!r) return;
  showConfirm('確認刪除', `刪除此筆紀錄？\n${r.desc}\n${r.type==='income'?'＋':'－'} NT$ ${r.amount.toLocaleString()}`, () => {
    state.records = state.records.filter(x => x.id !== id);
    // recalc balanceAfter
    let b = INIT_BALANCE;
    state.records.forEach(rec => {
      b += rec.type === 'income' ? rec.amount : -rec.amount;
      rec.balanceAfter = b;
    });
    saveState();
    render();
  }, true);
}

// ── SERVICE WORKER ────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ── INIT ──────────────────────────────────────────────
render();
</script>
